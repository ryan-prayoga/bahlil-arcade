<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#d6ad63"/>
  <rect width="1200" height="300" fill="#e6d09a" opacity="0.55"/>
  <!-- sapuan baliho -->
  <g transform="rotate(-20 0 0)" opacity="0.12">
    <rect x="-60" y="-120" width="46" height="600" fill="#f7b50a"/>
    <rect x="40" y="-120" width="46" height="600" fill="#f7b50a"/>
    <rect x="140" y="-120" width="46" height="600" fill="#f7b50a"/>
  </g>
  <!-- bingkai -->
  <rect x="18" y="18" width="1164" height="594" rx="10" fill="none" stroke="#1c1510" stroke-width="10"/>

  <!-- ===== KIRI: teks ===== -->
  <!-- spanduk -->
  <g>
    <rect x="64" y="84" width="470" height="96" fill="#e23b2e" stroke="#1c1510" stroke-width="7"/>
    <polygon points="64,84 30,132 64,180" fill="#e23b2e" stroke="#1c1510" stroke-width="7"/>
    <polygon points="534,84 568,132 534,180" fill="#e23b2e" stroke="#1c1510" stroke-width="7"/>
    <text x="299" y="148" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-weight="900" font-size="64" letter-spacing="2" fill="#fbf7ec">BAHLIL</text>
  </g>
  <rect x="184" y="190" width="230" height="40" fill="#f7b50a" stroke="#1c1510" stroke-width="5"/>
  <text x="299" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800"
        font-size="24" letter-spacing="8" fill="#1c1510">ARCADE</text>

  <text x="64" y="320" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="78" fill="#1c1510">Tangkap MBG</text>
  <text x="66" y="378" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#3a2e22">
    Sambut yang bergizi, tampik yang basi.</text>

  <!-- url chip -->
  <rect x="64" y="470" width="540" height="62" rx="6" fill="#1c1510"/>
  <text x="92" y="511" font-family="'Courier New', monospace" font-weight="700" font-size="30" fill="#f7b50a">
    bahlil-arcade.ryanprayoga.dev</text>

  <text x="64" y="582" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#3a2e22" opacity="0.7">
    Konten parodi · bukan tokoh asli</text>

  <!-- ===== KANAN: ilustrasi ===== -->
  <g transform="translate(910 315)">
    <!-- kotak MBG jatuh -->
    <g transform="translate(-30 -210) rotate(-10)">
      <g stroke="#1c1510" stroke-width="6" stroke-linejoin="round">
        <path d="M-44,-40 q8,-18 0,-34 M-12,-40 q8,-18 0,-34 M20,-40 q8,-18 0,-34" fill="none" stroke="#fff" stroke-width="6"/>
        <rect x="-58" y="-40" width="116" height="86" rx="12" fill="#f6f1e6"/>
        <ellipse cx="-14" cy="6" rx="22" ry="14" fill="#fff"/>
        <circle cx="22" cy="2" r="14" fill="#16916b"/>
        <circle cx="10" cy="26" r="11" fill="#f7b50a"/>
      </g>
    </g>
    <!-- kotak basi jatuh -->
    <g transform="translate(150 -150) rotate(14) scale(0.8)">
      <g stroke="#1c1510" stroke-width="6" stroke-linejoin="round">
        <rect x="-58" y="-40" width="116" height="86" rx="12" fill="#c9cdb0"/>
        <line x1="-44" y1="-26" x2="44" y2="38" stroke="#e23b2e" stroke-width="9"/>
        <line x1="44" y1="-26" x2="-44" y2="38" stroke="#e23b2e" stroke-width="9"/>
      </g>
    </g>

    <!-- maskot -->
    <g stroke="#1c1510" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
      <!-- nampan -->
      <rect x="-110" y="120" width="220" height="52" rx="18" fill="#d8b06a"/>
      <rect x="-110" y="150" width="220" height="22" rx="11" fill="#b98a44" stroke="none"/>
      <!-- badan batik -->
      <rect x="-78" y="30" width="156" height="100" rx="26" fill="#16916b"/>
      <!-- tangan -->
      <circle cx="-86" cy="124" r="18" fill="#b07a45"/>
      <circle cx="86" cy="124" r="18" fill="#b07a45"/>
      <!-- kepala -->
      <circle cx="0" cy="-30" r="58" fill="#c08a52"/>
      <!-- peci -->
      <path d="M-60,-50 a60,40 0 0 1 120,0 z" fill="#241c16"/>
      <!-- mata + senyum -->
      <g stroke="none" fill="#1c1510">
        <circle cx="-20" cy="-34" r="7"/>
        <circle cx="20" cy="-34" r="7"/>
      </g>
      <path d="M-20,-8 a22,22 0 0 0 40,0" fill="none" stroke="#1c1510" stroke-width="6"/>
    </g>
    <!-- motif zigzag batik -->
    <g stroke="#f7b50a" stroke-width="5" fill="none" opacity="0.95">
      <polyline points="-70,52 -55,60 -40,52 -25,60 -10,52 5,60 20,52 35,60 50,52 65,60"/>
      <polyline points="-70,80 -55,88 -40,80 -25,88 -10,80 5,88 20,80 35,88 50,80 65,88"/>
    </g>
  </g>
</svg>
